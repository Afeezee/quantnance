# Nginx configuration for Quantnance frontend
# Handles SPA (React Router) routing and proxies /api/* to the backend.
# ${BACKEND_URL} is substituted by envsubst at container start.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API proxy — forward to FastAPI backend ────────────────────────────────
    location /api/ {
        resolver 8.8.8.8 valid=10s;
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long timeout for AI analysis routes
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        # Allow file uploads up to 12 MB
        client_max_body_size 12m;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA routing — all unmatched routes serve index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
